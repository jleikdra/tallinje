<!DOCTYPE html>
<html lang="no">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Harehopp på Tallinja</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        background: #2d5a1b;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        overflow: hidden;
      }

      #app {
        position: relative;
        width: 1280px;
        height: 720px;
        max-width: 100vw;
        max-height: 100vh;
      }

      #game-container {
        position: absolute;
        inset: 0;
      }

      #game-container canvas {
        display: block;
        width: 100% !important;
        height: 100% !important;
      }

      /* HUD overlay on top of canvas */
      #hud {
        position: absolute;
        inset: 0;
        pointer-events: none;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
      }

      #hud-top {
        pointer-events: auto;
        display: flex;
        align-items: flex-start;
        gap: 8px;
        padding: 16px 20px 0;
      }

      #task-bubble {
        background: #fffdf5;
        border: 3px solid #c8a850;
        border-radius: 16px;
        padding: 12px 16px;
        font-size: 1.25rem;
        font-weight: 600;
        color: #3a2a00;
        max-width: 820px;
        line-height: 1.4;
        flex: 1;
      }

      #speak-btn {
        background: #f0c030;
        border: 3px solid #c8a020;
        border-radius: 50%;
        width: 52px;
        height: 52px;
        font-size: 1.5rem;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
        transition: background 0.15s;
      }
      #speak-btn:hover { background: #e6b820; }

      #progress-row {
        display: flex;
        gap: 6px;
        align-items: center;
        padding-left: 4px;
      }

      .star { font-size: 1.4rem; }

      #hud-bottom {
        pointer-events: auto;
        padding: 0 20px 20px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 10px;
      }

      #feedback-box {
        background: rgba(255,253,245,0.95);
        border: 3px solid #c8a850;
        border-radius: 14px;
        padding: 10px 18px;
        font-size: 1.1rem;
        color: #3a2a00;
        max-width: 760px;
        text-align: center;
        display: none;
      }
      #feedback-box.visible { display: block; }
      #feedback-box.correct { border-color: #4caf50; background: #f0fff0; }
      #feedback-box.wrong { border-color: #e07020; background: #fff8f0; }

      #choices {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        justify-content: center;
      }

      .choice-btn {
        background: #f0e8c8;
        border: 3px solid #c8a850;
        border-radius: 14px;
        padding: 12px 28px;
        font-size: 1.5rem;
        font-weight: 700;
        color: #3a2a00;
        cursor: pointer;
        min-width: 80px;
        min-height: 56px;
        transition: background 0.15s, transform 0.1s;
      }
      .choice-btn:hover { background: #e8d8a8; transform: scale(1.04); }
      .choice-btn:active { transform: scale(0.97); }
      .choice-btn:disabled { opacity: 0.5; cursor: default; transform: none; }

      #build-controls {
        display: none;
        gap: 16px;
        align-items: center;
        flex-wrap: wrap;
        justify-content: center;
      }
      #build-controls.visible { display: flex; }

      .build-field {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 4px;
      }
      .build-label {
        font-size: 0.9rem;
        font-weight: 600;
        color: #fffdf5;
        text-shadow: 0 1px 2px rgba(0,0,0,0.5);
      }
      .build-stepper {
        display: flex;
        align-items: center;
        gap: 4px;
      }
      .stepper-btn {
        background: #f0c030;
        border: 2px solid #c8a020;
        border-radius: 8px;
        width: 40px;
        height: 40px;
        font-size: 1.4rem;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .stepper-val {
        background: #fffdf5;
        border: 2px solid #c8a850;
        border-radius: 8px;
        width: 56px;
        height: 40px;
        font-size: 1.2rem;
        font-weight: 700;
        text-align: center;
        color: #3a2a00;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      #submit-build-btn {
        background: #4caf50;
        border: 3px solid #388e3c;
        border-radius: 14px;
        padding: 12px 32px;
        font-size: 1.3rem;
        font-weight: 700;
        color: #fff;
        cursor: pointer;
        transition: background 0.15s;
      }
      #submit-build-btn:hover { background: #43a047; }

      /* Menu overlay */
      #menu-overlay {
        position: absolute;
        inset: 0;
        background: rgba(0,0,0,0.0);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 24px;
        pointer-events: none;
      }
      #menu-overlay.visible { pointer-events: auto; }

      /* Parent panel */
      #parent-panel {
        position: absolute;
        inset: 0;
        background: rgba(20,10,0,0.85);
        display: none;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 16px;
        z-index: 100;
      }
      #parent-panel.visible { display: flex; }
      #parent-panel-inner {
        background: #fffdf5;
        border-radius: 20px;
        padding: 32px 40px;
        max-width: 520px;
        width: 90%;
        display: flex;
        flex-direction: column;
        gap: 16px;
      }
      #parent-panel h2 {
        font-size: 1.5rem;
        color: #3a2a00;
        text-align: center;
      }
      .panel-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        font-size: 1rem;
        color: #3a2a00;
      }
      .toggle-btn {
        background: #ccc;
        border: none;
        border-radius: 20px;
        width: 52px;
        height: 28px;
        cursor: pointer;
        position: relative;
        transition: background 0.2s;
      }
      .toggle-btn.on { background: #4caf50; }
      .toggle-btn::after {
        content: '';
        position: absolute;
        top: 3px;
        left: 3px;
        width: 22px;
        height: 22px;
        background: white;
        border-radius: 50%;
        transition: transform 0.2s;
      }
      .toggle-btn.on::after { transform: translateX(24px); }
      .panel-danger-btn {
        background: #e53935;
        border: none;
        border-radius: 10px;
        color: white;
        padding: 10px 20px;
        font-size: 1rem;
        cursor: pointer;
        align-self: center;
      }
      .panel-close-btn {
        background: #555;
        border: none;
        border-radius: 10px;
        color: white;
        padding: 10px 24px;
        font-size: 1rem;
        cursor: pointer;
        align-self: center;
      }

      /* Gear button */
      #gear-btn {
        position: absolute;
        bottom: 12px;
        right: 16px;
        background: rgba(255,255,255,0.25);
        border: 2px solid rgba(255,255,255,0.4);
        border-radius: 50%;
        width: 40px;
        height: 40px;
        font-size: 1.2rem;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 10;
      }

      @media (orientation: portrait) and (max-width: 767px) {
        #app { width: 100vw; height: 100vh; }
        #rotate-hint {
          display: flex !important;
        }
      }

      #rotate-hint {
        display: none;
        position: fixed;
        inset: 0;
        background: #2d5a1b;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 16px;
        color: #fffdf5;
        font-size: 1.2rem;
        text-align: center;
        padding: 24px;
        z-index: 200;
      }
      #rotate-hint .icon { font-size: 3rem; }

      @media (prefers-reduced-motion: reduce) {
        *, *::before, *::after {
          animation-duration: 0.001ms !important;
          transition-duration: 0.001ms !important;
        }
      }
    </style>
  </head>
  <body>
    <div id="rotate-hint" aria-live="polite">
      <div class="icon">🔄</div>
      <p>Snu enheten til liggende modus for best spillopplevelse.</p>
    </div>
    <div id="app">
      <div id="game-container" role="img" aria-label="Spillflate med tallinje og hare"></div>

      <div id="hud" aria-live="polite">
        <div id="hud-top">
          <div id="task-bubble" role="status" aria-atomic="true"></div>
          <button id="speak-btn" aria-label="Les opp oppgaven" title="Les opp">🔊</button>
        </div>
        <div id="hud-bottom">
          <div id="feedback-box" role="alert" aria-atomic="true"></div>
          <div id="choices" role="group" aria-label="Svaralternativer"></div>
          <div id="build-controls" aria-label="Bygg tallinja">
            <div class="build-field">
              <span class="build-label">Start</span>
              <div class="build-stepper">
                <button class="stepper-btn" id="start-minus" aria-label="Reduser start">−</button>
                <div class="stepper-val" id="start-val" aria-live="polite">0</div>
                <button class="stepper-btn" id="start-plus" aria-label="Øk start">+</button>
              </div>
            </div>
            <div class="build-field">
              <span class="build-label">Slutt</span>
              <div class="build-stepper">
                <button class="stepper-btn" id="end-minus" aria-label="Reduser slutt">−</button>
                <div class="stepper-val" id="end-val" aria-live="polite">10</div>
                <button class="stepper-btn" id="end-plus" aria-label="Øk slutt">+</button>
              </div>
            </div>
            <div class="build-field">
              <span class="build-label">Hopp</span>
              <div class="build-stepper">
                <button class="stepper-btn" id="step-minus" aria-label="Reduser hopp">−</button>
                <div class="stepper-val" id="step-val" aria-live="polite">1</div>
                <button class="stepper-btn" id="step-plus" aria-label="Øk hopp">+</button>
              </div>
            </div>
            <button id="submit-build-btn">Sjekk tallinja</button>
          </div>
        </div>
      </div>

      <button id="gear-btn" aria-label="Foreldrepanel" title="Innstillinger">⚙️</button>

      <div id="menu-overlay" role="dialog" aria-label="Velg pakke"></div>
      <div id="parent-panel" role="dialog" aria-label="Foreldrepanel">
        <div id="parent-panel-inner">
          <h2>Foreldrepanel</h2>
          <div class="panel-row">
            <span>Lyd</span>
            <button class="toggle-btn on" id="sound-toggle" aria-pressed="true">
              <span class="sr-only">Lyd</span>
            </button>
          </div>
          <div class="panel-row">
            <span>Opplesning</span>
            <button class="toggle-btn on" id="speech-toggle" aria-pressed="true">
              <span class="sr-only">Opplesning</span>
            </button>
          </div>
          <div id="pack-overview" style="font-size:0.95rem; color:#3a2a00;"></div>
          <button class="panel-danger-btn" id="reset-progress-btn">Nullstill fremgang</button>
          <button class="panel-close-btn" id="close-panel-btn">Lukk</button>
        </div>
      </div>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
